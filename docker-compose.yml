name: tuwaiqx

services:
  tuwaiqx-web:
    build: .
    container_name: tuwaiqx-web
    depends_on:
      tuwaiqx-postgres:
        condition: service_healthy
      tuwaiqx-redis:
        condition: service_started
      tuwaiqx-minio:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://tuwaiqx:tuwaiqx@postgres:5432/tuwaiqx}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_PATH: ${STORAGE_PATH:-/data/uploads}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    ports:
      - "3000:3000"
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped

  tuwaiqx-postgres:
    image: pgvector/pgvector:pg16
    container_name: tuwaiqx-postgres
    environment:
      POSTGRES_USER: tuwaiqx
      POSTGRES_PASSWORD: tuwaiqx
      POSTGRES_DB: tuwaiqx
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuwaiqx -d tuwaiqx"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - postgres
    restart: unless-stopped

  tuwaiqx-redis:
    image: redis:7-alpine
    container_name: tuwaiqx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      default:
        aliases:
          - redis
    restart: unless-stopped

  tuwaiqx-minio:
    image: minio/minio:RELEASE.2024-06-22T05-26-45Z
    container_name: tuwaiqx-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tuwaiqx
      MINIO_ROOT_PASSWORD: tuwaiqx-minio-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      default:
        aliases:
          - minio
    restart: unless-stopped

  tuwaiqx-ollama:
    image: ollama/ollama:latest
    container_name: tuwaiqx-ollama
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      default:
        aliases:
          - ollama
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  ollama-data:
  uploads:
